# ── Meditech gateway reverse proxy ───────────────────────────────────────────
# Nginx sits in front of the FastAPI/uvicorn gateway. In this lab the gateway
# runs on the HOST (via run_postgres.ps1 on :8060), so we proxy to
# host.docker.internal. When you containerise the gateway for production, change
# the upstream to the gateway service name (e.g. server gateway:8060;).

upstream meditech_gateway {
    server host.docker.internal:8060;
    keepalive 16;
}

# ---- HTTP (port 80) ----------------------------------------------------------
server {
    listen 80;
    server_name _;                      # replace with your domain in production

    # patient document / file uploads (MinIO-backed) need a larger body limit
    client_max_body_size 25m;

    # compression for text assets
    gzip on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # baseline security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://meditech_gateway;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # RAG / LLM answers can take a while — don't cut them off at the default 60s
        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }
}

