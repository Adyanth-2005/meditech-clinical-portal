# Bangalore City Hospital - Meditech Lab Stack (UE26MT324, PES University)
# Start:  docker compose up -d
# Stop:   docker compose down        (keeps data)
# Wipe:   docker compose down -v     (DELETES all data - avoid)
#
# Service URLs:
#   NiFi      https://localhost:8443/nifi
#   Kibana    http://localhost:5601
#   MinIO     http://localhost:9001
#   Postgres  localhost:5433   (host port 5433 -> container 5432)
#   Portal    http://localhost/  (via nginx -> host gateway on :8060)

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
      # - "443:443"          # enable when you add TLS
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    networks:
      - meditech_net

  # Apache NiFi - data pipeline builder (HL7 / FHIR ingestion)
  nifi:
    image: apache/nifi:1.24.0
    container_name: nifi
    ports:
      - "8443:8443"
      - "8081:8081"
      - "8082:8082"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=MeditechSecret123!
      - NIFI_WEB_HTTPS_HOST=
      - NIFI_WEB_HTTP_HOST=
      - NIFI_WEB_PROXY_HOST=localhost:8443,127.0.0.1:8443
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
    networks:
      - meditech_net

  # PostgreSQL - relational EHR + RBAC users + audit (host port 5433)
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=healthcare_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d healthcare_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - meditech_net

  # Elasticsearch - full-text search + analytics (security off, lab only)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - meditech_net

  # Kibana - dashboards over Elasticsearch
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - meditech_net

  # MinIO - S3-compatible object storage (clinical documents/images)
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=MeditechSecret123!
    volumes:
      - minio_data:/data
    networks:
      - meditech_net

volumes:
  nifi_data:
  pg_data:
  es_data:
  minio_data:

networks:
  meditech_net:
    driver: bridge
